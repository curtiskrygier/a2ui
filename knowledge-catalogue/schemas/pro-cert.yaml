id: pro-cert
name: "Professional Certification (Generic)"
description: "Generic schema for vendor professional certifications. Override fields per cert."
render_strategy: domain_hub

# Hub tabs = exam domains, ordered by weight descending
hub_tab_order_by: weight_desc

# Each instantiated cert YAML should extend this schema and fill in:
# - id, name, vendor, exam fields
# - domains list with required_competencies

# Atom type map for pro certs differs slightly from academic:
atom_type_map:
  concept: flashcard_deck       # term/definition or service description
  glossary: flashcard_deck      # acronyms, service names
  scenario: knowledge_check     # "which service for this use case" MCQ
  comparison: flashcard_deck    # service A vs service B
  piege: knowledge_check        # "don't confuse X with Y"
  method: steps                 # step-by-step architecture patterns
  checklist: key_takeaways      # exam-day reminders

# ── Example instantiation: AWS SAA-C03 ───────────────────────────────────────
# Copy to schemas/aws-saa-c03.yaml and fill in:
