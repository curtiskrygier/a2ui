blocks:
- type: intro
  description: Italic series link and/or transparency note shown at the top
  compact_description: series link or transparency note at article top
  surfaces:
    works_on:
    - web
    - meet-stage
    - googlechat
    - email
    - pdf
    - apps-script-web
  fields:
    series_label: string
    series_url: url
    continuation: string (optional)
    note: string (optional)
  source: &id001
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: body
  description: One or more prose paragraphs
  compact_description: prose paragraph block
  surfaces:
    works_on:
    - web
    - meet-stage
    - googlechat
    - email
    - pdf
    - apps-script-web
  fields:
    text: string
  source: *id001
- type: heading
  description: H2 section title
  compact_description: H2 section title
  surfaces:
    works_on:
    - web
    - meet-stage
    - googlechat
    - email
    - pdf
    - apps-script-web
  fields:
    text: string
  source: *id001
- type: subheading
  description: H3 subsection title
  compact_description: H3 subsection title
  surfaces:
    works_on:
    - web
    - meet-stage
    - googlechat
    - email
    - pdf
    - apps-script-web
  fields:
    text: string
  source: *id001
- type: quote
  description: Pull quote or blockquote
  compact_description: pull quote or blockquote with attribution
  surfaces:
    works_on:
    - web
    - meet-stage
    - email
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: blockquote styling stripped — renders as plain text
  fields:
    text: string
    attribution: string (optional)
  source: *id001
- type: code
  description: Fenced code block
  compact_description: syntax-highlighted fenced code block
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: renders as monospace text, no syntax highlighting
    - surface: email
      note: pre/code styling unreliable across email clients — use plain text or image
  fields:
    language: string
    content: string
  source: *id001
- type: pipeline
  description: Inline left-to-right flow (e.g. build pipeline steps)
  compact_description: left-to-right step flow diagram
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: monospace background stripped — use bullet_list instead
    - surface: email
      note: background colour unreliable — use bullet_list instead
  fields:
    steps: list[string]
  source: *id001
- type: bullet_list
  description: Unordered list with optional bold lead-in per item
  compact_description: unordered list with optional bold label per item
  surfaces:
    works_on:
    - web
    - meet-stage
    - googlechat
    - email
    - pdf
    - apps-script-web
  fields:
    items:
    - label: string (optional)
      text: string
  source: *id001
- type: divider
  description: Visual section break
  compact_description: horizontal visual section break
  surfaces:
    works_on:
    - web
    - meet-stage
    - email
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: hr not supported in Chat cards — omit or use heading instead
  source: *id001
- type: youtube
  description: Responsive 16:9 embedded YouTube video
  compact_description: responsive 16:9 YouTube embed
  surfaces:
    works_on:
    - web
    - meet-stage
    degraded_on:
    - surface: apps-script-web
      note: iframe embeds may be blocked by apps-script-web CSP in IFRAME sandbox
        mode
    incompatible_on:
    - surface: googlechat
      reason: iframes not supported — use image with link instead
    - surface: email
      reason: iframes stripped by all email clients — use image thumbnail with link
    - surface: pdf
      reason: iframes not renderable in PDF — use image thumbnail
  fields:
    url: string
    caption: string (optional)
  embedding_notes:
    referrerpolicy_warning: 'Never set referrerpolicy="no-referrer" on a YouTube iframe.
      YouTube uses the HTTP Referer header to validate the embedding domain. Suppressing
      it causes Error 153 ("Video player configuration error") even when the video
      owner has not disabled embedding. Omit the attribute entirely.

      '
    allow_attribute: 'Always include allow="autoplay; encrypted-media" on the iframe
      element. This is required for autoplay to work under the browser Permissions
      Policy.

      '
    meet_stage_params: 'On meet-stage, the renderer uses autoplay+muted params so
      video starts immediately without user interaction: ?autoplay=1&mute=1&controls=0&loop=1&playlist={vid_id}&rel=0&modestbranding=1&playsinline=1&iv_load_policy=3&fs=0
      autoplay=1 + mute=1 is required as a pair — Chrome blocks unmuted autoplay.
      controls=0 hides the player bar. loop=1 requires playlist={vid_id} to work.

      '
    oopif_layout_note: 'YouTube iframes are rendered as OOPIF (Out-of-Process IFrame)
      compositor layers in Chrome. The OOPIF layer covers only the iframe''s own bounding
      rectangle — not the full viewport. HTML siblings placed below the iframe in
      a flex column are fully accessible and interactive. The constraint is only that
      you cannot overlay HTML elements on top of the iframe''s rect (z-index tricks
      won''t work within its bounds).

      '
  source: *id001
- type: image
  description: Single image with caption, hosted at a public URL
  compact_description: single image with optional caption
  surfaces:
    works_on:
    - web
    - meet-stage
    - email
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: external images may be blocked by Chat security policy — use Chat-hosted
        URLs
  fields:
    url: string
    alt: string
    caption: string (optional)
    width: string (optional)
  source: *id001
- type: image_pair
  description: Two images side by side with individual captions
  compact_description: two images side by side with captions
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: table layout may reflow — use two separate image blocks instead
    - surface: email
      note: side-by-side layout unreliable on mobile email — use two separate images
  fields:
    left:
      url: string
      alt: string
      caption: string (optional)
    right:
      url: string
      alt: string
      caption: string (optional)
  source: *id001
- type: diagram
  description: SVG architecture diagram hosted at a public URL
  compact_description: D2 or SVG architecture diagram
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: SVG may not render — use PNG export instead
    - surface: email
      note: SVG support inconsistent across email clients — use PNG export
  fields:
    url: string
    caption: string (optional)
  source: *id001
- type: github_repo_card
  description: GitHub repo card — fetches live star/fork/language/push data from GitHub
    API at render time and embeds as self-contained HTML
  compact_description: live GitHub repo card with stars forks and language
  surfaces:
    works_on:
    - web
    - apps-script-web
    degraded_on:
    - surface: meet-stage
      note: use repo_links instead — no network fetch at stage render time
    - surface: googlechat
      note: not supported
    - surface: email
      note: not supported
    - surface: pdf
      note: not supported
  fields:
    repo: string
    label: string
    description: string
  source: *id001
- type: repo_links
  description: Formatted GitHub repo link list at end of article
  compact_description: styled GitHub repo link list
  surfaces:
    works_on:
    - web
    - meet-stage
    - email
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: list styling stripped — renders as plain links
  fields:
    links:
    - label: string
      url: string
  source: *id001
- type: closing
  description: Final paragraph + optional hashtags
  compact_description: article closing paragraph with hashtags
  surfaces:
    works_on:
    - web
    - meet-stage
    - googlechat
    - email
    - pdf
    - apps-script-web
  fields:
    text: string
    tags: list[string] (optional)
  source: *id001
- type: callout
  description: Highlighted alert box — info, warning, tip, or danger
  compact_description: coloured tip info warning or danger highlight box
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: border-left and background colour stripped — use bold text prefix instead
    - surface: email
      note: background colour unreliable — test across clients or use plain bold text
  fields:
    kind: info | warning | tip | danger
    title: string (optional)
    text: string
  source: *id001
- type: steps
  description: Numbered sequential steps with blue circle indicators
  compact_description: numbered step-by-step instruction sequence
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: custom list styling stripped — use bullet_list with manual numbering
    - surface: email
      note: flexbox layout unreliable — use ordered_list or bullet_list
  fields:
    items:
    - label: string (optional)
      text: string
  source: *id001
- type: table
  description: HTML table with styled headers, alternating rows, horizontal scroll
  compact_description: data table with header row on mobile
  surfaces:
    works_on:
    - web
    - meet-stage
    - email
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: HTML tables not supported in Chat cards — use bullet_list or key_value
        instead
  fields:
    caption: string (optional)
    headers: list[string]
    rows: list[list[string]]
  source: *id001
- type: tabs
  description: CSS-only tabbed panels — ideal for multi-language code examples
  compact_description: tabbed content panels
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on: null
    incompatible_on:
    - surface: googlechat
      reason: CSS radio button trick not supported — use separate code blocks
    - surface: email
      reason: CSS :checked not supported in email — use separate code blocks
    - surface: pdf
      reason: interactive CSS not renderable — use separate code blocks
  fields:
    accent: string (optional)
    tabs:
    - label: string
      language: string
      content: string
  source: *id001
- type: key_value
  description: Key-value table for env vars, config options, API fields
  compact_description: label and value pairs in a compact grid
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: table layout stripped — use bullet_list with bold keys instead
    - surface: email
      note: table styling may vary — test or use bullet_list
  fields:
    title: string (optional)
    items:
    - key: string
      description: string
      required: bool (optional)
      default: string (optional)
  source: *id001
- type: before_after
  description: Side-by-side code comparison — red/green panels showing old vs new
  compact_description: side-by-side code or content before and after comparison approach
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on:
    - surface: pdf
      note: colour panels may not export cleanly — use two separate code blocks
    incompatible_on:
    - surface: googlechat
      reason: side-by-side layout and colour styling not supported — use two code
        blocks
    - surface: email
      reason: flexbox and background colour unreliable — use two separate code blocks
  fields:
    language: string
    before: string
    after: string
    before_label: string (optional)
    after_label: string (optional)
    caption: string (optional)
  source: *id001
- type: api_reference
  description: Full API/function reference block — name, description, parameters table,
  compact_description: API endpoint method parameters and response docs returns, example
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: complex table layout not supported — use key_value + code block instead
    - surface: email
      note: nested table styling unreliable — use key_value + code block
  fields:
    name: string
    kind: function | endpoint | class | method
    method: string (optional)
    description: string
    deprecated: bool (optional)
    parameters:
    - name: string
      type: string
      required: bool (optional)
      description: string
      default: string (optional)
    returns: string (optional)
    example:
      label: string (optional)
      language: string
      code: string
  source: *id001
- type: gallery
  description: Responsive image grid with CSS-only lightbox on click
  compact_description: scrollable image gallery grid
  surfaces:
    works_on:
    - web
    - apps-script-web
    degraded_on:
    - surface: meet-stage
      note: CSS :target lightbox may not work in iframe — images show without lightbox
    - surface: pdf
      note: grid renders but lightbox is non-functional — use image_pair or image
    incompatible_on:
    - surface: googlechat
      reason: CSS grid and :target not supported — use image_pair instead
    - surface: email
      reason: CSS grid and :target stripped — use individual image blocks
  fields:
    cols: 2 | 3 | 4 (optional, default 3)
    caption: string (optional)
    images:
    - url: string
      alt: string
      caption: string (optional)
  source: *id001
- type: video_pair
  description: Two YouTube videos side by side with optional labels
  compact_description: two videos side by side
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on: null
    incompatible_on:
    - surface: googlechat
      reason: iframes not supported — use two image thumbnails with links
    - surface: email
      reason: iframes stripped — use image thumbnails with links
    - surface: pdf
      reason: iframes not renderable — use image thumbnails
  fields:
    caption: string (optional)
    left:
      url: string
      label: string (optional)
    right:
      url: string
      label: string (optional)
  embedding_notes:
    referrerpolicy_warning: See youtube atom — same rule applies. Never set referrerpolicy="no-referrer".
    allow_attribute: Include allow="autoplay; encrypted-media" on each iframe.
  source: *id001
- type: carousel
  description: CSS-only sliding carousel with dot indicators and prev/next arrows
  compact_description: horizontally scrollable card carousel
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on:
    - surface: pdf
      note: only first slide renders — use gallery instead
    incompatible_on:
    - surface: googlechat
      reason: CSS radio button trick not supported — use image_pair or gallery
    - surface: email
      reason: CSS :checked not supported in email — use individual images
  fields:
    accent: string (optional)
    caption: string (optional)
    slides:
    - url: string
      label: string (optional)
      subtitle: string (optional)
  source: *id001
- type: timeline
  description: Vertical timeline with dot connectors, date badges, tag pills
  compact_description: chronological event timeline
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: flexbox layout and custom styling stripped — use bullet_list with bold
        dates
    - surface: email
      note: flexbox unreliable on mobile email — use bullet_list with bold dates
  fields:
    title: string (optional)
    accent: string (optional)
    events:
    - date: string
      label: string
      text: string
      tag: string (optional)
  source: *id001
- type: annotated_code
  description: Code block with numbered yellow callout bubbles on specific lines,
  compact_description: code block with numbered callout bubbles on specific lines
    explanation list below
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on:
    - surface: pdf
      note: callout bubbles may not render inline — consider code + steps instead
    incompatible_on:
    - surface: googlechat
      reason: inline flexbox badges not supported — use code block + bullet_list
    - surface: email
      reason: inline positioning unreliable — use code block + bullet_list
  fields:
    language: string
    code: string
    caption: string (optional)
    annotations:
    - line: integer
      text: string
  source: *id001
- type: stat_card
  description: Glowing neon stat card — large value with label and optional delta
  compact_description: single KPI value with label delta and accent colour indicator
  source: &id002
    name: UIverse.io community
    url: https://uiverse.io
    license: MIT
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on:
    - surface: pdf
      note: glow animations not rendered — displays as flat card
    incompatible_on:
    - surface: googlechat
      reason: complex CSS not supported — use key_value or body instead
    - surface: email
      reason: CSS gradients and animations unreliable — use plain text
  fields:
    value: string
    label: string
    delta: string (optional)
    is_up: bool (optional)
    accent: string (optional)
- type: progress_bar
  description: Animated CSS progress bar with glow pulse effect
  compact_description: labelled horizontal progress bar with percentage
  source: *id002
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on:
    - surface: pdf
      note: animation not rendered — shows static bar
    incompatible_on:
    - surface: googlechat
      reason: CSS animations not supported — use bullet_list or body
    - surface: email
      reason: CSS animations stripped — use plain percentage text
  fields:
    value: integer (0-100)
    label: string
    accent: string (optional)
    show_percent: bool (optional)
    caption: string (optional)
- type: badge_group
  description: Group of coloured status badges with optional pulse animation — green/cyan/blue/yellow/red/purple/grey
  compact_description: row of coloured label badges
  source: *id002
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on:
    - surface: email
      note: background colours may vary — test or use plain text labels
    - surface: pdf
      note: pulse animations not rendered — badges display as flat
    incompatible_on:
    - surface: googlechat
      reason: inline flex and border-radius not supported — use bullet_list
  fields:
    title: string (optional)
    badges:
    - text: string
      color: green|cyan|blue|yellow|red|purple|grey
      pulse: bool (optional)
- type: sparkline
  description: Renders a small, simple line chart without axes or coordinates, showing
  compact_description: inline SVG trend line chart general trends.
  source: &id003
    name: UIverse.io community
    url: https://uiverse.io
    license: MIT
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on: null
    incompatible_on:
    - surface: googlechat
      reason: Requires SVG or Canvas rendering which is not supported. Consider `metric_delta`
        or `trend_indicator` for textual trends.
    - surface: email
      reason: Requires dynamic rendering or complex image generation, not suitable
        for static email content.
    - surface: pdf
      reason: Requires dynamic rendering or complex image generation, not suitable
        for static PDF content.
  fields:
    data: list of numbers (e.g., [10, 12, 8, 15, 13])
    color: string (hex or named color, e.g., '#4CAF50' or 'green')
    line_width: number (e.g., 2)
    height: string (CSS height value, e.g., '20px')
    width: string (CSS width value, e.g., '80px')
- type: heatmap
  description: Renders a graphical representation of data where individual values
  compact_description: grid heatmap coloured by intensity value are represented as
    colors in a matrix.
  source: *id003
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on: null
    incompatible_on:
    - surface: googlechat
      reason: Requires complex grid and color rendering which is not supported. No
        direct alternative.
    - surface: email
      reason: Requires complex rendering (SVG/Canvas/CSS Grid), not suitable for static
        email content.
    - surface: pdf
      reason: Requires complex rendering (SVG/Canvas/CSS Grid), not suitable for static
        PDF content.
  fields:
    data: list of lists of numbers (e.g., [[1, 2, 3], [4, 5, 6]])
    labels_x: list of strings (labels for the x-axis, e.g., ['Mon', 'Tue', 'Wed'])
    labels_y: list of strings (labels for the y-axis, e.g., ['AM', 'PM'])
    color_scale: list of strings (colors for the gradient, e.g., ['#FFFFFF', '#FF0000']
      for white to red)
    unit: string (optional, unit for the data values, e.g., '°C')
- type: punch_card
  description: Renders a Day-of-Week vs. Hour-of-Day bubble grid (punch card) of repository
    or commit activity, where bubble size is proportional to activity.
  compact_description: 7x24 grid of glowing activity bubbles representing hourly commits
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on: null
    incompatible_on:
    - surface: googlechat
      reason: Requires complex SVG bubble rendering which is not supported.
    - surface: email
      reason: Requires SVG, not supported in static emails.
    - surface: pdf
      reason: Requires SVG, not supported in static PDFs.
  fields:
    data: list of lists of numbers (7 rows representing days of week, each containing
      24 numbers representing commit frequency for each hour)
    labels_days: list of strings (optional, e.g., ['Mon', 'Tue', 'Wed', 'Thu', 'Fri',
      'Sat', 'Sun'])
    color: string (optional, hex or named color for active bubbles, e.g., '#00f2ff')
    title: string (optional, title of the repository or chart, e.g., 'Commit Activity')
    subtitle: string (optional, subtitle, e.g., 'curtiskrygier/meetstudio')
- type: sankey_flow
  description: Renders a flow diagram (Sankey flow) where left-hand source nodes connect
    to right-hand target nodes via beautiful, curved gradient Bezier bands.
  compact_description: curved dual-column gradient flow diagram for financial or pipeline
    streams
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on: null
    incompatible_on:
    - surface: googlechat
      reason: Requires complex SVG path calculations.
    - surface: email
      reason: Requires SVG, not supported in static emails.
    - surface: pdf
      reason: Requires SVG, not supported in static PDFs.
  fields:
    nodes: 'list of dictionaries representing columns (e.g., [{''id'': ''revenue'',
      ''label'': ''Revenue'', ''column'': 0, ''color'': ''#10b981''}, ...])'
    links: 'list of dictionaries representing flows (e.g., [{''source'': ''revenue'',
      ''target'': ''marketing'', ''value'': 25000, ''color'': ''#38bdf8''}, ...])'
    title: string (optional, title of the chart, e.g., 'Financial Flow Allocation')
- type: cohort_retention
  description: Renders a SaaS subscription or customer cohort retention triangular
    matrix with color-coded continuous gradients.
  compact_description: triangular cohort retention grid with continuous color-scale
    rendering
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on: null
    incompatible_on:
    - surface: googlechat
      reason: Requires complex triangular layout and color scale.
    - surface: email
      reason: Requires SVG or CSS grid.
    - surface: pdf
      reason: Requires SVG or CSS grid.
  fields:
    cohorts: 'list of dictionaries representing cohorts (e.g., [{''cohort_name'':
      ''Jan 2026'', ''original_size'': 2500, ''retention_rates'': [100.0, 93.4]}])'
    periods: list of strings representing period headers (e.g., ['Month 0', 'Month
      1'])
    color_scale: list of strings representing the continuous color scale (e.g., ['#1e293b',
      '#10b981'])
    title: string (optional, chart title, e.g., 'SaaS Retention Cohorts')
- type: donut_stat
  description: Renders a single key metric with a surrounding donut chart indicating
  compact_description: CSS ring chart with centre value and percentage its proportion
    or progress.
  source: *id003
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: Only the metric value, label, and percentage will be rendered as text.
        The visual donut chart is not supported.
    incompatible_on:
    - surface: email
      reason: Requires SVG or Canvas rendering for the donut chart, which is not supported
        in email clients.
    - surface: pdf
      reason: Requires dynamic rendering for the donut chart, not suitable for static
        PDF content.
  fields:
    value: number (the current value, e.g., 75)
    max_value: number (the maximum possible value, e.g., 100)
    label: string (descriptive label for the metric, e.g., 'Completion')
