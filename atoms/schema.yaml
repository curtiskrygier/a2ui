    title: string (optional). Heading text.
    body: string (optional). Body text (markdown inline supported).
    delay: string (optional). CSS delay before animation starts, e.g. "0.3s". Default
      "0s".
    speed: '"slow" | "normal" | "fast"  (optional, default "normal")'
    direction: '"up" | "down" | "left" | "right" | "none"  (optional, default "up").
