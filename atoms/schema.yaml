    format: string (optional). json | text. Default json.
    path: string (optional). Dot-notation path into parsed response (e.g. data.items).
    refresh: integer (optional). Client refresh interval seconds. 0 = initial load
      only. Default 0.
    cache: integer (optional). Server-side CacheService TTL seconds. Default 15.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: adsb_feed
  description: OpenSky Network ADS-B live traffic feed for a geographic bounding box.
    Fetches server-side on render (cached), refreshes client-side every refresh seconds.
    Publishes normalised flight objects {callsign, lat, lon, alt_ft, spd_kt, hdg,
    on_ground, squawk} to the named feed. Unauthenticated OpenSky limit is 400 req/day
    — keep cache TTL >= 15s.
