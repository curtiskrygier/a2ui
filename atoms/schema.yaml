  source: *id005
- type: glass_card
  description: Frosted-glass card with backdrop-filter blur. Use for dark-theme highlight
    boxes, callouts, or content wrappers. Content is raw HTML string.
  compact_description: frosted-glass card with blur backdrop — dark-theme highlight
    box
  surfaces:
    works_on:
    - apps-script-web
  fields:
    title: string (optional). Card heading text.
    content: string (optional). Inner HTML content of the card.
    blur: integer (optional). Backdrop blur in px. Default 18.
    bg: string (optional). Background colour (rgba). Default rgba(255,255,255,0.05).
    border: string (optional). Border colour (rgba). Default rgba(255,255,255,0.1).
    padding: string (optional). CSS padding. Default 28px.
    radius: string (optional). Border radius. Default 16px.
  source: *id005
- type: tilt_card
  description: 3D perspective-tilt card that follows the cursor with a gyroscopic
    tilt effect and optional glare highlight. Use for hero cards, feature highlights,
    or any content that benefits from depth.
  compact_description: 3D gyroscopic tilt card with cursor-tracking perspective and
    optional glare
  surfaces:
    works_on:
    - apps-script-web
  fields:
    title: string (optional). Card heading.
    content: string (optional). Inner HTML content.
    max_tilt: integer (optional). Maximum tilt angle in degrees. Default 14.
    glare: boolean (optional). Show glare highlight. Default true.
    accent: string (optional). Glare/accent colour. Default rgba(255,255,255,0.15).
    padding: string (optional). CSS padding. Default 28px.
  source: *id005
- type: cursor_glow
  description: Page-wide ambient cursor glow effect — a large soft radial gradient
    that follows the mouse cursor. Adds cinematic depth to dark pages. Should be placed
    once per page near the top of the block list.
  compact_description: ambient cursor-following radial glow overlay — cinematic dark-page
    effect
  surfaces:
    works_on:
    - apps-script-web
  fields:
    colour: string (optional). Glow colour hex. Default
    size: integer (optional). Glow diameter in px. Default 380.
    opacity: number (optional). Glow opacity 0–1. Default 0.18.
    speed: number (optional). Follow speed 0–1 (lerp factor). Default 0.1.
    blend: string (optional). CSS mix-blend-mode. Default screen.
  source: *id005
- type: youtube
  description: YouTube video link card. GAS sandbox blocks iframe playback, so this
    renders as a styled link card with a "Watch on YouTube" button opening in a new
    tab. Use url field with the full YouTube watch URL.
  compact_description: YouTube video link card (GAS sandbox — renders as watch-on-YouTube
    button)
  surfaces:
    works_on:
    - apps-script-web
    incompatible_on:
    - surface: email
      reason: iframes stripped by all email clients — use image thumbnail with link
    - surface: pdf
      reason: iframes not renderable in PDF — use image thumbnail
  fields:
    url: string (required). Full YouTube watch URL e.g. https://www.youtube.com/watch?v=VIDEO_ID.
    title: string (optional). Card label shown above the link.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui
    license: MIT
- type: embed_codepen
  description: CodePen sandbox embed — degrades to an external link card in GAS. Use
    url field with the CodePen pen URL.
  compact_description: CodePen embed — degrades to link card in GAS
  surfaces:
    works_on:
    - apps-script-web
  fields:
    url: string (required). CodePen pen URL.
  source: *id005
- type: embed_stackblitz
  description: StackBlitz live IDE embed — degrades to an external link card in GAS.
    Use url field with the StackBlitz project URL.
  compact_description: StackBlitz embed — degrades to link card in GAS
  surfaces:
    works_on:
    - apps-script-web
  fields:
    url: string (required). StackBlitz project URL.
  source: *id005
- type: embed_gist
  description: GitHub Gist widget embed — degrades to an external link card in GAS.
  compact_description: GitHub Gist embed — degrades to link card in GAS
  surfaces:
    works_on:
    - apps-script-web
  fields:
    url: string (required). GitHub Gist URL.
  source: *id005
- type: embed_google_slides
  description: Google Slides presentation preview — degrades to an external link card
    in GAS.
  compact_description: Google Slides embed — degrades to link card in GAS
  surfaces:
    works_on:
    - apps-script-web
  fields:
    url: string (required). Google Slides share URL.
  source: *id005
- type: figma_embed
  description: Figma design canvas embed — degrades to an external link card in GAS.
  compact_description: Figma embed — degrades to link card in GAS
  surfaces:
    works_on:
    - apps-script-web
  fields:
    url: string (required). Figma file or prototype URL.
  source: *id005
- type: lottie_animation
  description: Lottie JSON animation — degrades to a static fallback image in GAS
    (Lottie requires external JS bundles not available in the sandbox). Provide fallback_image_url
    for best results.
  compact_description: Lottie animation — degrades to static fallback image in GAS
  surfaces:
    works_on:
    - apps-script-web
  fields:
    fallback_image_url: string (optional). Static image URL shown in GAS instead of
      the animation.
    caption: string (optional). Caption below the fallback image.
  source: *id005
- type: parallax_card
  description: Parallax scrolling card that degrades to a static card with title and
    subtitle in GAS (parallax effect requires client JS not available in sandbox).
  compact_description: parallax card — degrades to static title/subtitle card in GAS
  surfaces:
    works_on:
    - apps-script-web
  fields:
    title: string (optional). Card heading.
    subtitle: string (optional). Card subtext.
  source: *id005
- type: embed_tweet
  description: Twitter/X tweet embed rendered as a static blockquote with tweet text
    and author. Use when quoting a tweet in content — renders cleanly without external
    JS.
  compact_description: static tweet quote blockquote with author attribution — no
    external JS needed
  surfaces:
    works_on:
    - apps-script-web
  fields:
    text: string (required). Tweet text content.
    author: string (optional). Twitter handle or display name shown as citation.
  source: *id005
- type: social_feed_embed
  description: Social media feed embed — degrades to a link card in GAS. Use url to
    link to the profile or feed directly.
  compact_description: social feed embed — degrades to link card in GAS
  surfaces:
    works_on:
    - apps-script-web
  fields:
    url: string (required). Social media profile or feed URL.
  source: *id005
- type: live_demo_embed
  description: Live demo sandbox embed — degrades to a styled link card with title,
    note, and "Open Demo" button in GAS. Use for linking to external live demos or
    prototypes.
  compact_description: live demo embed — degrades to link card with Open Demo button
    in GAS
  surfaces:
    works_on:
    - apps-script-web
  fields:
    title: string (optional). Demo title shown in card header.
    url: string (required). Demo URL to open in new tab.
    note: string (optional). Explanatory note shown in the card body.
  source: *id005
- type: gmail_inbox
  description: Horizontal swipeable carousel of Gmail inbox threads. Each card shows
    a coloured sender avatar, name, subject (bold if unread), snippet and timestamp.
    Clicking opens the thread in Gmail. On GAS uses GmailApp for live data; on other
    surfaces renders from items[] array or Gmail REST API.
  compact_description: swipeable Gmail inbox carousel — live on GAS, items[] or api
    connector on web/meet
  surfaces:
    works_on:
    - apps-script-web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Live inbox threads via GmailApp.getInboxThreads() — no config needed
  - id: static
    surfaces:
    - '*'
    live: false
    description: Pass items[] array of email objects
    fields:
      items: array of {from_name, from_addr, subject, snippet, date_iso, unread, thread_id}
  - id: api
    surfaces:
    - web
    - meet-stage
    live: true
    description: Gmail REST API threads.list — pass auth_token field
    endpoint: https://gmail.googleapis.com/gmail/v1/users/me/threads
    fields:
      auth_token: OAuth2 bearer token
  fields:
    title: string (optional). Section label above carousel. Default "Inbox".
    count: integer (optional). Number of threads, max 20. Default 10.
    accent: string (optional). Accent colour for unread indicator and nav dot. Default
    items: array (static connector). Email objects for non-GAS surfaces.
    auth_token: string (api connector). OAuth2 bearer token for REST API.
  source: *id005
- type: drive_recent_files
  description: Horizontal swipeable carousel of recently modified Drive files. Each
    card shows a coloured file-type badge (DOC/XLS/PPT/PDF), name, relative modified
    time, and owner. On GAS searches files modified in last 30 days via DriveApp;
    on other surfaces renders from items[] array or Drive REST API.
  compact_description: swipeable Drive files carousel — live on GAS, items[] or api
    connector on web/meet
  surfaces:
    works_on:
    - apps-script-web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Live files via DriveApp.searchFiles() — no config needed
  - id: static
    surfaces:
    - '*'
    live: false
    description: Pass items[] array of file objects
    fields:
      items: array of {name, mime, url, modified_iso, owner}
  - id: api
    surfaces:
    - web
    - meet-stage
    live: true
    description: Drive REST API files.list — pass auth_token field
    endpoint: https://www.googleapis.com/drive/v3/files?orderBy=modifiedTime desc
    fields:
      auth_token: OAuth2 bearer token
  fields:
    title: string (optional). Section label above carousel. Default "Recent Files".
    count: integer (optional). Number of files to show, max 20. Default 10.
    accent: string (optional). Accent colour for active nav dot. Default
    items: array (static connector). File objects for non-GAS surfaces.
    auth_token: string (api connector). OAuth2 bearer token for REST API.
  source: *id005
- type: drive_folder_contents
  description: Responsive grid of files and subfolders inside a Drive folder. Subfolders
    appear first, each item shows a coloured file-type badge and name, clicking opens
    in Drive. On GAS uses DriveApp with folder_id; on other surfaces renders from
    items[] array or Drive REST API with folder_id + auth_token.
  compact_description: Drive folder grid — live on GAS via folder_id, items[] or api
    connector on web/meet
  surfaces:
    works_on:
    - apps-script-web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Live folder contents via DriveApp.getFolderById(folder_id)
  - id: static
    surfaces:
    - '*'
    live: false
    description: Pass items[] array of file objects
    fields:
      items: array of {name, mime, url}
  - id: api
    surfaces:
    - web
    - meet-stage
    live: true
    description: Drive REST API files.list with parent filter — pass folder_id + auth_token
    endpoint: https://www.googleapis.com/drive/v3/files?q='{folder_id}' in parents
    fields:
      auth_token: OAuth2 bearer token
  fields:
    folder_id: string (gas-native/api). The Google Drive folder ID to browse.
    title: string (optional). Override for the folder name shown as header.
    count: integer (optional). Max items to show. Default 12.
    items: array (static connector). File objects for non-GAS surfaces.
    auth_token: string (api connector). OAuth2 bearer token for REST API.
  source: *id005
- type: drive_file_card
  description: Single Drive file card — coloured file-type badge (DOC/XLS/PPT/PDF),
    file name, optional description, and an "Open →" button. Works on any surface
    using static name/mime/url fields. On GAS, file_id triggers live lookup via DriveApp
    to populate name and mime automatically.
  compact_description: single Drive file card — static on all surfaces; live name/type
    lookup via file_id on GAS
  surfaces:
    works_on:
    - apps-script-web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Live file metadata via DriveApp.getFileById(file_id)
  - id: static
    surfaces:
    - '*'
    live: false
    description: Pass name, mime, url fields directly — works on any surface
    fields:
      name: file display name
      mime: MIME type string for badge colour
      url: URL to open when clicked
  fields:
    file_id: string (gas-native). Drive file ID for live name/type lookup on GAS.
    name: string. File display name — required on non-GAS surfaces.
    mime: string. MIME type for badge colour (e.g. application/vnd.google-apps.spreadsheet).
    url: string. URL to open — required on non-GAS surfaces.
    description: string (optional). Short description shown below the file name.
  source: *id005
- type: progress_store
  description: Invisible state connector atom — no visual output. Initialises window._A2UI_STORE
    and dispatches "a2ui:store" CustomEvent. On GAS reads initial state from a Google
    Sheet at render time and writes back async via google.script.run. On web reads/writes
    localStorage keyed by course_id. All other LMS atoms read from and write to this
    shared store. Must appear before any stateful atom on the page.
  compact_description: invisible LMS state connector — Sheet on GAS, localStorage
    on web; exposes window._A2UI_STORE
  surfaces:
    works_on:
    - apps-script-web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Reads/writes a per-course Google Sheet via a2uiProgressRead / a2uiProgressWrite
  - id: static
    surfaces:
    - '*'
    live: false
    description: Web surface reads/writes localStorage keyed by course_id
  fields:
    course_id: string (required). Unique course identifier — scopes the Sheet and
      localStorage key.
  source: *id005
- type: module_map
  description: Visual curriculum grid showing all modules in a course. Each card displays
    module icon, title, description, duration, and a live status badge (locked/Start/Done)
    driven by progress_store. Locked modules are greyed out. Completed modules turn
    green. Cards navigate to module url on click.
  compact_description: course curriculum grid — module cards with live locked/available/complete
    status from progress_store
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    title: string (optional). Section heading. Default "Course Modules".
    columns: integer (optional). Grid columns, max 4. Default 3.
    modules: 'array (required). Array of module objects. Each module supports: id
      (string, required), title, description, icon, duration, lessons, required[]
      (array of module ids that must be complete to unlock), and either: page (array
      of atom blocks, PREFERRED — auto-encoded into a self-contained URL at render
      time, no separate save needed) or url (string — only for external URLs or pre-saved
      nav pages). Always use page for inline module content.'
  source: *id005
- type: knowledge_check
  description: Lightweight inline comprehension pulse — a single multiple-choice question
    with instant feedback and no score impact. Correct answer turns green with explanation;
    wrong answer turns red with explanation. All options lock after selection. No
    retry gate — learner simply continues reading.
  compact_description: inline comprehension pulse — single question, instant feedback,
    no score pressure
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    question: string (required). The comprehension question.
    options: array (required). Array of answer strings.
    correct: integer (required). Zero-based index of the correct answer.
    explanation: string (optional). Explanation shown after any selection.
  source: *id005
- type: quiz_result_summary
  description: End-of-quiz result screen showing score percentage, pass/fail badge,
    time taken, per-question dot breakdown (green tick / red cross), and navigation
    buttons. Automatically writes the score to progress_store keyed by quiz_id. Pass
    mark is configurable.
  compact_description: end-of-quiz result — score %, pass/fail, question dots, writes
    to progress_store
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    score: integer (required). Number of correct answers.
    total: integer (required). Total number of questions.
    quiz_id: string (required). ID used to write score to progress_store.
    pass_mark: integer (optional). Percentage required to pass. Default 70.
    time_secs: integer (optional). Time taken in seconds for display.
    questions: array (optional). Array of {label, correct} for per-question breakdown
      dots.
    next_url: string (optional). URL for Continue button (shown when passed).
    retry_url: string (optional). URL for Retry button.
  source: *id005
- type: scenario_branch
  description: Narrative branching learning atom. Presents a real-world situation
    with 2-4 labelled choices. Each choice reveals a consequence with good/neutral/bad
    outcome styling (green/amber/red). Includes a "try again" reset on non-linked
    consequences. Ideal for compliance, leadership, and soft-skills training.
  compact_description: branching scenario — situation + choices + consequence reveal
    with good/neutral/bad outcome
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    scenario: string (required). The situation or challenge presented to the learner.
    context: string (optional). Background context shown in italics above the scenario.
    accent: string (optional). Accent colour for choice buttons. Default
    choices: array (required). Array of {label, consequence, outcome, next_url?} objects.
      outcome is "good", "neutral", or "bad".
  source: *id005
- type: completion_gate
  description: Renders a locked placeholder card until the specified module id is
    marked complete in progress_store. Once complete, the gate disappears to reveal
    content below it. Use to sequence content and prevent skipping.
  compact_description: content lock — hides until requires module id is complete in
    progress_store
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    requires: string (required). Module id that must be complete in progress_store
      to unlock.
    label: string (optional). Lock card heading. Default "Locked".
    message: string (optional). Message shown on the lock card.
  source: *id005
- type: certification_card
  description: Completion certificate card — earner name, course title, issuer, and
    date with a gradient border and trophy icon. Locked behind a requires check against
    progress_store; becomes visible when the course is marked complete. On GAS, earner
    name is derived from active session if not supplied.
  compact_description: completion certificate — locked until requires id complete
    in progress_store; earner from GAS session
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    course: string (required). Course name on the certificate.
    issuer: string (optional). Issuing organisation name. Default "A2UI Learning".
    requires: string (optional). Module/course id that must be complete to reveal
      the certificate.
    earner: string (optional). Earner display name — auto-derived from GAS session
      if not set.
    date: string (optional). Completion date string. Defaults to today.
    accent: string (optional). Gradient accent colour. Default
  source: *id005
- type: skill_radar
  description: SVG spider/radar chart plotting learner competency levels across multiple
    skill dimensions. Optional before values render as a dashed polygon overlay for
    before/after growth comparison. Values are 0-100 per skill.
  compact_description: SVG radar/spider chart of skill competency levels — optional
    before/after growth overlay
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    title: string (optional). Chart heading. Default "Skill Profile".
    accent: string (optional). Fill/stroke colour for current polygon. Default
    skills: array (required). Array of {label, value (0-100), before? (0-100)} objects.
  source: *id005
- type: badge_showcase
  description: Achievement badge wall — all course badges displayed in a grid. Earned
    badges glow with indigo highlight and full colour emoji; locked badges are greyed
    and dimmed. Each badge checks its required_id against progress_store to determine
    earned status.
  compact_description: achievement badge wall — earned badges glow, locked badges
    grey; status from progress_store
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    title: string (optional). Section heading. Default "Achievements".
    columns: integer (optional). Grid columns, max 6. Default 4.
    badges: array (required). Array of {id, label, icon, description, required_id}
      objects. required_id is the progress_store key to check for completion.
  source: *id005
- type: learning_path_selector
  description: Path chooser presented at course entry. Shows 2-4 role or level path
    cards (icon, title, description, duration). Learner clicks to select — selection
    is stored in progress_store via setPath() and optionally navigates to a path-specific
    url. Selected path can drive personalised module_map content.
  compact_description: course entry path chooser — role/level cards, writes selection
    to progress_store, optional navigation
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    title: string (optional). Chooser heading. Default "Choose Your Path".
    intro: string (optional). Introductory text below the heading.
    paths: array (required). Array of {id, label, description, icon, accent, duration,
      url?} objects.
  source: *id005
- type: video_checkpoint
  description: YouTube video with interactive quiz questions injected at specified
    timestamps. Video pauses at each checkpoint and the learner must answer before
    playback resumes. Correct/wrong feedback shown with explanation. Checkpoint state
    tracked per-session; completed checkpoints are skipped on replay.
  compact_description: YouTube video with pausing quiz checkpoints — learner must
    answer to continue
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    youtube_id: string (required). YouTube video ID.
    title: string (optional). Section heading above the player.
    checkpoints: array (required). Array of {at_seconds, question, options[], correct
      (0-based index), explanation} objects.
  source: *id005
- type: cohort_progress_board
  description: Instructor-facing table showing all enrolled learners with per-module
    completion ticks and average quiz scores. On GAS reads live from the course progress
    Sheet via a2uiCohortRead. On web renders from static items[] array. Shows enrolled
    and active learner counts at top.
  compact_description: instructor cohort table — per-learner module completion + scores;
    live on GAS
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Live read from course progress Sheet via a2uiCohortRead(course_id)
  - id: static
    surfaces:
    - '*'
    live: false
    description: Render from items[] — array of {email, progress{}, updated_at} objects
  fields:
    course_id: string (required). Matches the progress_store course_id.
    title: string (optional). Board heading. Default "Cohort Progress".
    modules: array (optional). Array of {id, label} for column headers. Drives per-module
      completion dots.
    items: array (optional, web/static). Array of {email, progress{}, updated_at}
      learner objects.
  source: *id005
- type: reflection_prompt
  description: Structured free-text reflection textarea with a submit button. Saves
    the response to progress_store under the key "reflect:<prompt_id>". On GAS this
    persists to the learner's progress Sheet. Restores previously saved text on revisit.
  compact_description: reflection textarea — saves to progress_store; restores on
    revisit
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    prompt: string (required). The reflection question shown above the textarea.
    prompt_id: string (optional). Key suffix for progress_store. Default "reflection".
    placeholder: string (optional). Textarea placeholder text.
    accent: string (optional). Accent colour. Default
  source: *id005
- type: annotation_highlight
  description: Rich body text passage with clickable highlighted terms that reveal
    inline explanations in a panel below. No state required. Ideal for glossary enrichment,
    technical definitions, or legal clause annotation within learning content.
  compact_description: annotated body text — click highlighted terms to reveal inline
    explanations
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    text: string (required). Body text passage. Annotated terms are replaced server-side.
    notes: array (required). Array of {term, explanation, color?} objects. First match
      in text is highlighted.
  source: *id005
- type: onboarding_stepper
  description: Guided step-by-step onboarding flow for first-time learners. Each step
    has a label, description, optional action URL (navigated to on completion), and
    a "Mark complete" button. Completed steps persist in progress_store and are restored
    on revisit. Progress count shown at top.
  compact_description: guided onboarding steps — completes to progress_store, restores
    on revisit
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    title: string (optional). Stepper heading. Default "Get Started".
    accent: string (optional). Active step indicator colour. Default
    steps: array (required). Array of {id, icon, label, description, action_label,
      action_url?} objects.
  source: *id005
- type: case_study_card
  description: Structured enterprise case study card. Sections for situation narrative,
    key data points (label/value/note), numbered analysis questions, and an optional
    model answer reveal. No state required. The model answer is hidden behind a toggle
    button.
  compact_description: structured case study — situation, data points, questions,
    optional model answer reveal
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    title: string (required). Case study title.
    situation: string (required). The scenario narrative.
    data_points: array (optional). Array of {label, value, note?} metric blocks.
    questions: array (optional). Array of question strings for analysis.
    model_answer: string (optional). Model answer text shown on toggle. Hidden by
      default.
    accent: string (optional). Accent colour for data point values. Default
  source: *id005
- type: study_timer
  description: Pomodoro-style focus/break countdown timer. Configurable focus and
    break durations. Animated SVG progress ring. Counts completed sessions. Session-scoped
    only — no persistence to progress_store.
  compact_description: Pomodoro focus/break timer with SVG ring — session only, no
    persistence
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    label: string (optional). Timer heading. Default "Study Timer".
    focus_mins: integer (optional). Focus period in minutes. Default 25.
    break_mins: integer (optional). Break period in minutes. Default 5.
    accent: string (optional). Ring and mode label colour. Default
  source: *id005
- type: rubric_card
  description: Assessment rubric table. Rows are assessment criteria, columns are
    performance levels (e.g. Beginning/Developing/Proficient/Exemplary). Descriptor
    text in each cell describes that level for that criterion. Static display — no
    state required.
  compact_description: assessment rubric table — criteria rows × performance level
    columns
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    title: string (optional). Table heading. Default "Assessment Rubric".
    levels: array (optional). Performance level column headers. Default [Beginning,
      Developing, Proficient, Exemplary].
    accent: string (optional). Highest-level column colour. Default
    criteria: array (required). Array of {criterion, descriptors[]} objects. descriptors[]
      maps to levels[] by index.
  source: *id005
- type: spaced_repetition_card
  description: Single flashcard with front/back flip animation and a post-flip confidence
    rating (1-5 with emoji). Writes {rating, next_days, rated_at} to progress_store
    under "srs:<card_id>". Next-review hint computed via simplified SM-2 (1→1d, 2→2d,
    3→4d, 4→7d, 5→14d).
  compact_description: flip flashcard with confidence rating 1-5 — writes SRS interval
    to progress_store
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    front: string (required). Front face — term or question.
    back: string (required). Back face — answer or definition.
    card_id: string (optional). Key for progress_store SRS data. Auto-generated if
      omitted.
    accent: string (optional). Front card highlight colour. Default
  source: *id005
- type: leaderboard_card
  description: Ranked learner leaderboard by score. On GAS reads live from the course
    progress Sheet via a2uiCohortRead, extracts scores for score_key, and ranks descending.
    On web renders from static items[]. Top 3 entries get gold/silver/bronze medal
    indicators. Per-row score bar visualises relative performance.
  compact_description: ranked score leaderboard — live on GAS from Sheet, static on
    web; medal top 3
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Reads and ranks from course progress Sheet via a2uiCohortRead
  - id: static
    surfaces:
    - '*'
    live: false
    description: Render from items[] — array of {name, score} objects
  fields:
    course_id: string (required). Matches progress_store course_id.
    score_key: string (optional). Which quiz score to rank on. Default "quiz1".
    limit: integer (optional). Max entries shown. Default 10.
    title: string (optional). Card heading. Default "Leaderboard".
    items: array (optional, web/static). Array of {name, score} objects for static
      rendering.
  source: *id005
- type: nav_bar
  description: Horizontal or vertical navigation bar linking to other named A2UI pages.
    Generates correct ?nav=<slug>&from=<current_slug> URLs at runtime using window._A2UI_NAV
    — no deployment URL needs to be hard-coded. Optionally sticky below the system
    nav header. Active page is highlighted automatically by comparing slugs.
  compact_description: named-page nav bar — generates ?nav= URLs at runtime from _A2UI_NAV;
    active page auto-highlighted
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    label: string (optional). Small uppercase label above the bar.
    layout: string (optional). "horizontal" (default) or "vertical".
    sticky: boolean (optional). Whether to stick below the system nav header. Default
      true.
    top_offset: integer (optional). Top offset in px when sticky. Default 52.
    accent: string (optional). Active link accent colour. Default
    links: array (required). Array of {nav_slug, label, icon?, active?} objects. nav_slug
      is the saved page slug; the correct URL is generated at runtime.
  source: *id005
- type: nav_link
  description: Single CTA button or link that navigates to a named A2UI page. Automatically
    appends &from=<current_slug> so the destination page's back button returns here.
    Style variants — primary (filled indigo), ghost (border), or text (minimal).
  compact_description: single CTA link to a named page — appends from= automatically
    for back-button support
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    nav_slug: string (required). Slug of the destination named page.
    label: string (optional). Button label. Default "Continue →".
    icon: string (optional). Emoji or icon prefix.
    style: string (optional). "primary" (default), "ghost", or "text".
    align: string (optional). "left" (default), "center", or "right".
  source: *id005
- type: breadcrumb
  description: Horizontal breadcrumb trail linking to named pages. Reads window._A2UI_NAV
    at runtime to highlight the current page. Pass an ordered array of crumbs from
    root to current — the matching slug is rendered as non-clickable active text.
  compact_description: breadcrumb trail linking named pages — current slug auto-highlighted
    from _A2UI_NAV
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    items: array (required). Array of {slug, label, icon?} objects in order from root
      to current page.
  source: *id005
