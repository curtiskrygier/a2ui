      reason: No JS or interactive state
    - surface: email
      reason: No JS support in email clients
  fields:
    pairs: 'list[{term: string, definition: string}]. 3 to 8 pairs recommended.'
    shuffle: boolean (optional, default true). Randomise right-column order on render.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: hint_reveal
  description: A "Show hint" disclosure button that expands to reveal help text. Built
    on the HTML details/summary element — no JavaScript required. The summary label
    toggles between "Show hint" and "Hide hint". Styled with a subtle left-border
    accent and muted background to visually separate it from body content.
  compact_description: show/hide hint disclosure using HTML details/summary — no JS
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: Renders as a plain text block with no toggle — hint always visible
    - surface: pdf
      note: Renders as a static tinted block with hint always visible
    - surface: email
      note: details/summary not reliably supported — renders hint as always-visible
        indented block
  fields:
    hint: string. The hint text revealed on expand.
    label: string (optional). Button label. Default "Show hint".
    accent: string (optional). Left-border and icon colour. Default "#6366f1".
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: achievement_badge
  description: Unlockable achievement or completion badge displayed as a circular
    icon with a title, description, and optional unlock date. Locked state shows a
    greyscale padlock overlay. Suitable for course completion, streak milestones,
    and skill certifications. Renders as a centred card or inline pill depending on
    size variant.
  compact_description: unlockable achievement badge with locked/unlocked state and
    optional date
  surfaces:
    works_on:
    - web
    - meet-stage
    - email
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: Renders as a plain text badge name and description — no icon or visual
        styling
  fields:
    title: string. Achievement name.
    description: string (optional). Short achievement description.
    icon: string (optional). Emoji or single character used as the badge icon. Default
      "🏆".
    locked: boolean (optional, default false). Shows greyscale padlock overlay when
      true.
    unlocked_at: string (optional). ISO date string shown beneath the badge when unlocked.
    color: string (optional). Badge accent colour. Default "#f59e0b".
    size: '"card" | "pill"  (optional, default "card")'
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: score_summary
  description: End-of-exercise or end-of-module score card showing correct answers,
    total questions, percentage, and optional time taken. Animates the score fraction
    on render using a CSS counter. Includes a contextual pass/fail or grade label
    and an optional retry/continue CTA row.
  compact_description: end-of-exercise score card with correct/total, percentage,
    grade, and CTA
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: Renders as a plain text score line — no visual card or animation
    - surface: email
      note: CSS counter animation stripped — renders as static score text card
  fields:
    correct: integer. Number of correct answers.
    total: integer. Total number of questions.
    time_taken: string (optional). Human-readable time string e.g. "2m 14s".
    pass_threshold: integer (optional). Percentage (0–100) required to pass. Drives
      pass/fail label colour.
    retry_label: string (optional). Label for the retry button. Omit to hide retry
      CTA.
    continue_label: string (optional). Label for the continue button. Omit to hide
      continue CTA.
    continue_url: url (optional). Destination for the continue button.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: xp_bar
  description: Experience points or gamification progress bar showing current XP,
    level label, and XP needed to reach the next level. The fill animates from the
    previous value to the current value on render via CSS transition. A level-up flash
    overlay triggers when xp_current equals or exceeds xp_next.
  compact_description: animated XP/points progress bar with level label and level-up
    flash
  surfaces:
    works_on:
    - web
    - meet-stage
    - apps-script-web
    degraded_on:
    - surface: pdf
      note: Renders as a static labelled progress bar — no animation or level-up effect
    incompatible_on:
    - surface: googlechat
      reason: No CSS animation or progress bar support
    - surface: email
      reason: CSS transitions and animation not reliably supported
  fields:
    level_label: string. Current level name e.g. "Level 3 — Intermediate".
    xp_current: integer. Current XP within the current level.
    xp_next: integer. XP required to reach the next level.
    accent: string (optional). Bar fill colour. Default "#6366f1".
    show_flash: boolean (optional, default true). Trigger level-up flash when xp_current
      >= xp_next.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: lesson_nav
  description: Previous/next lesson navigation bar with the current lesson title centred
    and module context shown above. Each side shows the adjacent lesson title and
    a directional arrow. Optionally shows a completion checkbox for the current lesson
    that persists via localStorage.
  compact_description: prev/next lesson navigation with module context and optional
    completion checkbox
  surfaces:
    works_on:
    - web
    - apps-script-web
    degraded_on:
    - surface: meet-stage
      note: Renders as a simplified prev/next pill row — localStorage persistence
        unavailable in iframe
    - surface: pdf
      note: Renders as a static prev/next text row with lesson titles
    - surface: googlechat
      note: Renders as a plain text prev/next line — no navigation links
    - surface: email
      note: Renders as a plain text nav row — links may be stripped by email clients
  fields:
    module_label: string (optional). Module or section name shown above the nav bar.
    current_title: string. Title of the current lesson.
    prev_title: string (optional). Title of the previous lesson. Omit to hide prev
      arrow.
    prev_url: url (optional). Link for the previous lesson.
    next_title: string (optional). Title of the next lesson. Omit to hide next arrow.
    next_url: url (optional). Link for the next lesson.
    show_completion: boolean (optional, default false). Show a "Mark as complete"
      checkbox persisted in localStorage.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: course_progress_card
  description: Overall course completion card showing a list of modules with individual
    progress bars and a top-level aggregate progress ring. Each module row shows its
    title, lesson count, and percentage complete. Suitable for a course sidebar or
    dashboard widget.
  compact_description: course-level progress card with per-module bars and aggregate
    completion ring
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: Renders as a plain text list of module titles and completion percentages
    - surface: email
      note: CSS progress bars stripped — renders as a static text list with percentages
  fields:
    course_title: string. Course name shown at the top of the card.
    modules: 'list[{title: string, lessons_total: integer, lessons_done: integer}].'
    accent: string (optional). Progress fill colour. Default "#6366f1".
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: highlighted_text
  description: Inline passage of text with a coloured highlight background and an
    optional margin annotation note. The annotation appears as a side-note pill on
    hover (CSS :hover) or as a visible aside on smaller viewports. Useful for reading
    comprehension exercises, exam technique callouts, and annotated source analysis.
  compact_description: highlighted text passage with optional hover margin annotation
    note
  surfaces:
    works_on:
    - web
    - meet-stage
    - pdf
    - apps-script-web
    degraded_on:
    - surface: googlechat
      note: Highlight background stripped — renders as plain text with annotation
        appended in brackets
    - surface: email
      note: Hover annotation not supported — annotation rendered as inline parenthetical
  fields:
    text: string. The passage to highlight.
    annotation: string (optional). Margin note revealed on hover.
    color: string (optional). Highlight background colour. Default "#fef08a" (yellow).
    annotation_color: string (optional). Annotation pill background. Default "#fbbf24".
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: drive_file_list
  description: Live list of files in a Google Drive folder rendered with icons and
    download links. Works on Google Apps Script only.
  compact_description: live list of Drive folder files
  surfaces:
    works_on:
    - apps-script-web
  fields:
    folder_id: string. The Google Drive folder ID to list files from.
    max_results: integer (optional). Maximum number of files to return. Default is
      10.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: sheet_preview
  description: Live read-only preview of a specified range in a Google Sheet. Renders
    as an HTML table. Works on Google Apps Script only.
  compact_description: live read-only Google Sheet range preview
  surfaces:
    works_on:
    - apps-script-web
  fields:
    spreadsheet_id: string. The Google Sheets ID.
    sheet_name: string. The name of the sheet tab.
    range: string. The A1 notation range (e.g. A1:D10).
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: gmail_summary
  description: Summary list of recent emails in the user's Gmail matching a search
    query. Works on Google Apps Script only.
  compact_description: list of recent Gmail messages matching query
  surfaces:
    works_on:
    - apps-script-web
  fields:
    query: string. The search query (e.g. "is:unread label:work").
    max_results: integer (optional). Maximum number of emails to display. Default
      is 5.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: calendar_upcoming
  description: List of upcoming events from the user's primary calendar. Works on
    Google Apps Script only.
  compact_description: list of upcoming calendar events
  surfaces:
    works_on:
    - apps-script-web
  fields:
    max_results: integer (optional). Maximum number of upcoming events to show. Default
      is 5.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: user_greeting
  description: Personalised greeting showing the active user's Google account email.
    Works on Google Apps Script only.
  compact_description: personalised greeting with active user email
  surfaces:
    works_on:
    - apps-script-web
  fields:
    prefix: string (optional). The greeting prefix. Default is "Hello".
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: script_run_button
  description: Interactive button that executes a custom Google Apps Script server
    function when clicked, showing a loading spinner and returning/displaying the
    function result. Works on Google Apps Script only.
  compact_description: button to trigger server-side Apps Script function
  surfaces:
    works_on:
    - apps-script-web
  fields:
    label: string. The button text.
    function_name: string. The name of the server-side V8 JavaScript function to call.
    argument: string (optional). Optional string argument to pass to the function.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: calendar_today
  description: Today's events from the user's default Google Calendar, displayed as
    a compact timeline with time and location. Automatically shows today's date in
    the header.
  compact_description: today's calendar events from the user's default calendar
  surfaces:
    works_on:
    - apps-script-web
  fields:
    title: string (optional). Card heading. Default is "Today's Schedule".
    max_results: integer (optional). Maximum events to show. Default 8.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: sheet_stats
  description: Aggregate statistics (sum, average, count, min, max) computed from
    a Google Sheet range and displayed as a row of stat badges. Ideal for dashboards.
  compact_description: aggregate stats from a sheet range displayed as stat badges
  surfaces:
    works_on:
    - apps-script-web
  fields:
    spreadsheet_id: string. The Google Sheets ID.
    sheet_name: string (optional). Sheet tab name.
    range: string. A1 notation range (e.g. B2:B50).
    label: string (optional). Card heading. Default is "Sheet Stats".
    show: array (optional). Which stats to show — any of sum, average, count, min,
      max. Default ["sum","average","count"].
    accent: string (optional). Accent colour for stat values.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: gmail_unread_count
  description: Unread message count badges for one or more Gmail labels, shown as
    a pill row. Zero counts are displayed in grey; non-zero in the accent colour.
  compact_description: unread count badges for Gmail labels
  surfaces:
    works_on:
    - apps-script-web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Live unread counts via GmailApp — no config needed
  - id: static
    surfaces:
    - '*'
    live: false
    description: Pass counts object e.g. {INBOX:4, Starred:1} via counts field
    fields:
      counts: object mapping label name to integer count
  - id: api
    surfaces:
    - web
    - meet-stage
    live: true
    description: Gmail REST API labels.list — pass auth_token field
    endpoint: https://gmail.googleapis.com/gmail/v1/users/me/labels
    fields:
      auth_token: OAuth2 bearer token
  fields:
    labels: array (optional). Gmail label names to count. Default ["INBOX"].
    title: string (optional). Card heading. Default is "Gmail".
    accent: string (optional). Badge colour for non-zero counts. Default red.
    counts: object (static connector). Label→count map for non-GAS surfaces.
    auth_token: string (api connector). OAuth2 bearer token for REST API.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: user_profile_card
  description: Personalised profile card showing the active user's avatar initial,
    display name (derived from email), email address, and Workspace domain. On GAS
    uses Session.getActiveUser(); on other surfaces renders from name/email fields.
  compact_description: user avatar, display name, email and domain — live on GAS,
    static fields elsewhere
  surfaces:
    works_on:
    - apps-script-web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Live user identity via Session.getActiveUser() — no config needed
  - id: static
    surfaces:
    - '*'
    live: false
    description: Pass name and email fields directly
    fields:
      name: display name string
      email: email address string
  fields:
    name: string (static connector). Display name for non-GAS surfaces.
    email: string (static connector). Email address for non-GAS surfaces.
    accent: string (optional). Avatar background colour.
    subtitle: string (optional). Role or team label shown below the email.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: drive_storage_usage
  description: Google Drive storage quota displayed as a labelled progress bar — used
    GB, total GB, and percentage. Bar colour shifts to amber above 70% and red above
    90%. On GAS uses DriveApp; elsewhere pass used_gb and total_gb fields.
  compact_description: Drive storage quota progress bar — live on GAS, or pass used_gb/total_gb
    for static
  surfaces:
    works_on:
    - apps-script-web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Live quota via DriveApp.getStorageUsed() — no config needed
  - id: static
    surfaces:
    - '*'
    live: false
    description: Pass used_gb and total_gb fields for display
    fields:
      used_gb: number, GB used
      total_gb: number, total quota GB
  - id: api
    surfaces:
    - web
    - meet-stage
    live: true
    description: Drive About API — pass auth_token field
    endpoint: https://www.googleapis.com/drive/v3/about?fields=storageQuota
    fields:
      auth_token: OAuth2 bearer token
  fields:
    label: string (optional). Card heading. Default is "Drive Storage".
    accent: string (optional). Bar colour below 70% usage.
    used_gb: number (static connector). GB used — for non-GAS surfaces.
    total_gb: number (static connector). Total quota GB — for non-GAS surfaces.
    auth_token: string (api connector). OAuth2 bearer token for REST API.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: sheet_form_submit
  description: Inline form that appends a timestamped row to a Google Sheet on submit.
    Calls google.script.run.a2uiSheetAppend server-side. Each field renders as a labelled
    input or textarea.
  compact_description: inline form that appends a row to a Google Sheet on submit
  surfaces:
    works_on:
    - apps-script-web
  fields:
    spreadsheet_id: string. Target Google Sheets ID.
    sheet_name: string (optional). Sheet tab name. Default is "Sheet1".
    title: string (optional). Form heading.
    fields: array. Array of {label, name, type, placeholder} objects. type is text,
      email, number, or textarea.
    submit_label: string (optional). Submit button text. Default is "Submit".
    accent: string (optional). Submit button colour.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: tasks_today
  description: Incomplete tasks displayed as an interactive checkbox list. On GAS
    uses the Tasks API for live data; on other surfaces renders from an items[] array
    or the Google Tasks REST API.
  compact_description: task checklist — live via Tasks API on GAS, items[] array on
    other surfaces
  surfaces:
    works_on:
    - apps-script-web
    - meet-stage
  connectors:
  - id: gas-native
    surfaces:
    - apps-script-web
    live: true
    description: Live tasks via Tasks API (must be enabled in GAS project)
  - id: static
    surfaces:
    - '*'
    live: false
    description: Pass items[] array of {title, due, completed} objects
    fields:
      items: array of {title, due (ISO date string), completed (boolean)}
  - id: api
    surfaces:
    - web
    - meet-stage
    live: true
    description: Google Tasks REST API — pass auth_token field
    endpoint: https://tasks.googleapis.com/tasks/v1/lists/@default/tasks
    fields:
      auth_token: OAuth2 bearer token
  fields:
    title: string (optional). Card heading. Default is "Today's Tasks".
    max_results: integer (optional). Maximum tasks to show. Default 10.
    list_name: string (optional, gas-native). Name of the task list.
    items: array (static connector). Array of {title, due, completed} for non-GAS
      surfaces.
    auth_token: string (api connector). OAuth2 bearer token for REST API.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: cursor_glow
  description: Ambient radial gradient orb that smoothly lerp-follows the cursor across
    the page using requestAnimationFrame. Uses CSS mix-blend-mode:screen for a light-leak
    feel. Page-scoped and double-init guarded.
  compact_description: ambient glowing orb that lerp-follows the cursor with screen
    blend
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    colour: string (optional). Orb colour. Default
    size: integer (optional). Orb diameter in px. Default 380.
    opacity: number (optional). Orb opacity 0–1. Default 0.18.
    speed: number (optional). Lerp factor 0–1 — lower = more lag. Default 0.1.
    blend: string (optional). CSS mix-blend-mode. Default screen.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: cursor_trail
  description: A chain of fading dots that follow the cursor using worm-chain physics
    — each dot lerps toward the one ahead of it, creating a fluid trailing effect.
  compact_description: chain of fading dots following the cursor with worm physics
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    colour: string (optional). Dot colour. Default
    length: integer (optional). Number of chain dots. Default 16.
    size: integer (optional). Lead dot diameter px. Default 10.
    speed: number (optional). Lerp factor per dot. Default 0.35.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: particle_burst
  description: On every click anywhere on the page, coloured particles burst outward
    from the click point with random velocities and simulated gravity, then fade out.
  compact_description: click anywhere to burst coloured gravity particles from click
    point
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    count: integer (optional). Particles per click. Default 14.
    colours: array (optional). Array of hex colour strings.
    size: integer (optional). Particle diameter px. Default 8.
    duration: integer (optional). Animation duration ms. Default 700.
    gravity: number (optional). Downward pull factor. Default 1.2.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: spotlight_cursor
  description: A dark overlay with a soft-edged circular cutout that follows the cursor
    — torch or spotlight effect. Best used as a standalone page effect or dramatic
    opening slide.
  compact_description: dark overlay with cursor-following circular cutout — torch
    effect
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    radius: integer (optional). Spotlight radius px. Default 180.
    darkness: number (optional). Overlay opacity 0–1. Default 0.82.
    colour: string (optional). Overlay colour. Default
    soft_edge: integer (optional). Feather distance px beyond radius. Default 60.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: magnetic_element
  description: Wraps content that drifts toward the cursor when it enters the activation
    radius, then springs back with a cubic-bezier overshoot when the cursor leaves.
  compact_description: content that drifts toward cursor and springs back with overshoot
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    label: string (optional). Text label for the default pill style.
    content: string (optional). Raw HTML to use instead of the default pill.
    accent: string (optional). Pill background colour. Default
    radius: integer (optional). Activation distance px. Default 120.
    strength: number (optional). Pull factor 0–1. Default 0.4.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: tilt_card
  description: A card that tilts in 3D perspective as the cursor moves across it,
    with a radial glare highlight that tracks cursor position. Uses CSS preserve-3d
    and dynamic box-shadow.
  compact_description: 3D perspective tilt card with glare highlight driven by cursor
    position
  surfaces:
    works_on:
    - apps-script-web
    - web
    - meet-stage
  fields:
    content: string (optional). Inner HTML rendered inside the card.
    title: string (optional). Card heading rendered above content.
    max_tilt: number (optional). Maximum rotation degrees. Default 14.
    glare: boolean (optional). Show glare highlight. Default true.
    accent: string (optional). Glare colour. Default rgba(255,255,255,0.15).
    padding: string (optional). Inner padding. Default 28px.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: doc_ai_summary
  description: Opens a Google Doc by ID, sends its text to Vertex AI Gemini, and renders
    the response as a structured summary card with word count and a link to the original
    doc. Requires VERTEX_PROJECT_ID in Script Properties.
  compact_description: AI-powered Google Doc summary via Vertex AI Gemini
  surfaces:
    works_on:
    - apps-script-web
  fields:
    doc_id: string. Google Doc ID to summarise.
    prompt: string (optional). Instruction sent to Gemini before the doc text.
    title: string (optional). Override card title. Defaults to the doc name.
    model: string (optional). Gemini model override. Defaults to VERTEX_MODEL property.
    max_chars: integer (optional). Max doc characters sent to Gemini. Default 12000.
    accent: string (optional). Accent colour.
    show_meta: boolean (optional). Show word count and doc link. Default true.
  source:
    name: a2ui-catalogue
    url: https://github.com/curtiskrygier/a2ui-catalogue
    license: MIT
- type: multi_doc_ai_brief
  description: Takes an array of Google Doc IDs and renders one Vertex AI Gemini summary
    card per doc — a compact briefing pack for meetings. Each doc can have its own
    prompt override.
  compact_description: multi-doc briefing pack — one Gemini summary card per Google
    Doc
  surfaces:
